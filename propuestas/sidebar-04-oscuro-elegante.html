<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 4 — Elegante oscuro + iconos outline</title>
<link href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    color: #1e1e2e;
  }
  .sidebar {
    width: 280px;
    background: #1a1a2e;
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 40;
  }
  .sidebar .brand {
    height: 72px;
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .sidebar .brand .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #a78bfa;
    box-shadow: 0 0 12px rgba(167,139,250,0.3);
  }
  .sidebar .brand h1 { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .sidebar .brand h1 span { color: #a78bfa; }
  .search-box {
    margin: 1rem 1rem 0.75rem;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 0.55rem 0.75rem 0.55rem 2rem;
    border-radius: 10px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.6);
    font-size: 0.75rem;
    font-family: inherit;
    outline: none;
    transition: all 0.15s;
  }
  .search-box input::placeholder { color: rgba(255,255,255,0.2); }
  .search-box input:focus { background: rgba(255,255,255,0.08); color: #fff; }
  .search-box i {
    position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.2); font-size: 0.75rem;
  }
  .nav { flex: 1; overflow-y: auto; padding: 0 0.5rem; }
  .nav a {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.65rem 0.75rem;
    border-radius: 10px;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 0.1rem;
  }
  .nav a:hover { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); }
  .nav a.active {
    background: rgba(167,139,250,0.1);
    color: #c4b5fd;
    font-weight: 600;
  }
  .nav a i { font-size: 1.05rem; min-width: 20px; text-align: center; opacity: 0.6; }
  .nav a.active i { opacity: 1; }
  .nav a .count {
    margin-left: auto;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.3);
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 100px;
  }
  .nav a.active .count { background: rgba(167,139,250,0.2); color: #c4b5fd; }
  .profile {
    padding: 1rem 1.25rem;
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 0.75rem;
  }
  .profile .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.75rem; color: #fff;
    flex-shrink: 0;
  }
  .profile .info { flex: 1; }
  .profile .info p { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.7); }
  .profile .info span { font-size: 0.62rem; color: rgba(255,255,255,0.25); }
  .profile .logout {
    width: 30px; height: 30px;
    border-radius: 8px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .profile .logout:hover { background: rgba(239,68,68,0.1); color: #fca5a5; }
  .main {
    margin-left: 280px; flex: 1; display: flex; flex-direction: column;
  }
  .topbar {
    height: 72px; background: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
  }
  .topbar h2 { font-size: 1rem; font-weight: 700; }
  .topbar .right { display: flex; align-items: center; gap: 1rem; }
  .topbar .right button {
    width: 36px; height: 36px; border-radius: 10px;
    border: none; background: #f5f5f7; color: #888;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .topbar .right button:hover { background: #eee; color: #555; }
  .topbar .right .pill {
    padding: 0.4rem 0.9rem;
    border-radius: 100px;
    background: #f3f0ff;
    color: #7c3aed;
    font-size: 0.7rem;
    font-weight: 700;
    text-decoration: none;
    display: flex; align-items: center; gap: 0.35rem;
  }
  .content { flex: 1; padding: 2rem; background: #f5f5f7; }
  .placeholder {
    background: #fff; border-radius: 16px;
    border: 1px solid #f0f0f4;
    padding: 2rem; text-align: center; color: #ccc; font-size: 0.9rem;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="logo-dot"></div>
      <h1>Aura <span>Luxe</span></h1>
    </div>
    <div class="search-box">
      <i class="pi pi-search"></i>
      <input type="text" placeholder="Buscar en el panel...">
    </div>
    <nav class="nav">
      <a href="#" class="active"><i class="pi pi-th-large"></i> Dashboard</a>
      <a href="#"><i class="pi pi-calendar"></i> Calendario <span class="count">3</span></a>
      <a href="#"><i class="pi pi-users"></i> Especialistas</a>
      <a href="#"><i class="pi pi-percentage"></i> Promociones</a>
      <a href="#"><i class="pi pi-star"></i> Valoraciones <span class="count">12</span></a>
      <a href="#"><i class="pi pi-clock"></i> Horarios</a>
      <a href="#"><i class="pi pi-chart-bar"></i> AI Analytics</a>
      <a href="#"><i class="pi pi-cog"></i> Ajustes</a>
    </nav>
    <div class="profile">
      <div class="avatar">A</div>
      <div class="info">
        <p>Administrador</p>
        <span>admin@auraluxe.com</span>
      </div>
      <button class="logout"><i class="pi pi-sign-out"></i></button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h2>Dashboard</h2>
      <div class="right">
        <button><i class="pi pi-moon"></i></button>
        <button><i class="pi pi-bell"></i></button>
        <a href="#" class="pill"><i class="pi pi-home"></i> Ver tienda</a>
      </div>
    </header>
    <div class="content">
      <div class="placeholder">Contenido principal</div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 3 — Flotante + Bottom Tabs</title>
<link href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f8f9fb;
    min-height: 100vh;
    color: #1e1e2e;
    padding: 1rem 1rem 0 1rem;
  }
  /* Desktop: floating sidebar */
  .sidebar {
    position: fixed;
    top: 1rem; left: 1rem; bottom: 1rem;
    width: 220px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.06);
    border: 1px solid #f0f0f4;
    display: flex; flex-direction: column;
    padding: 1.25rem 0.75rem;
    z-index: 40;
    transition: transform 0.2s;
  }
  .sidebar .logo {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.25rem 0.5rem 1rem;
    border-bottom: 1px solid #f3f3f7;
    margin-bottom: 1rem;
  }
  .sidebar .logo .icon {
    width: 34px; height: 34px;
    background: #1e1e2e;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 0.75rem;
  }
  .sidebar .logo h1 { font-size: 0.95rem; font-weight: 700; }
  .sidebar .logo h1 span { color: #888; }
  .nav { flex: 1; display: flex; flex-direction: column; gap: 0.15rem; }
  .nav a {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.6rem 0.65rem;
    border-radius: 10px;
    color: #999;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .nav a:hover { background: #f5f5f7; color: #555; }
  .nav a.active { background: #1e1e2e; color: #fff; }
  .nav a i { font-size: 1rem; min-width: 18px; text-align: center; }
  .profile {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.75rem 0.5rem 0;
    border-top: 1px solid #f3f3f7;
    margin-top: auto;
  }
  .profile .avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #f0f0f4;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.7rem; color: #888;
    flex-shrink: 0;
  }
  .profile .info { flex: 1; }
  .profile .info p { font-size: 0.72rem; font-weight: 600; color: #1e1e2e; }
  .profile .info span { font-size: 0.6rem; color: #bbb; }
  .profile .logout { color: #ddd; cursor: pointer; border: none; background: none; font-size: 0.9rem; transition: color 0.15s; }
  .profile .logout:hover { color: #ef4444; }
  .main {
    margin-left: 240px;
    min-height: calc(100vh - 2rem);
    display: flex; flex-direction: column;
  }
  .topbar {
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0.5rem 0 0;
  }
  .topbar h2 { font-size: 1.05rem; font-weight: 700; }
  .topbar .actions { display: flex; gap: 0.5rem; }
  .topbar .actions button {
    width: 34px; height: 34px; border-radius: 10px;
    border: none; background: #fff; color: #888;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: center;
  }
  .content { flex: 1; padding: 0.5rem 0; }
  .placeholder {
    background: #fff; border-radius: 16px;
    border: 1px solid #f0f0f4;
    padding: 2rem; text-align: center; color: #ccc; font-size: 0.9rem;
  }
  /* Mobile bottom tabs (shown at <768px in real use) */
  .mobile-tabs { display: none; }
  @media (max-width: 767px) {
    body { padding: 0 0 72px 0; }
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 1rem; min-height: calc(100vh - 72px); }
    .topbar { padding: 0; }
    .mobile-tabs {
      display: flex;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 72px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      border-top: 1px solid #f0f0f4;
      z-index: 50;
      justify-content: space-around;
      align-items: center;
      padding: 0.5rem 0;
    }
    .mobile-tabs a {
      display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
      text-decoration: none; color: #bbb; font-size: 0.55rem; font-weight: 600;
      transition: color 0.15s;
    }
    .mobile-tabs a i { font-size: 1.15rem; }
    .mobile-tabs a.active { color: #1e1e2e; }
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <div class="icon">AL</div>
      <h1>Aura <span>Luxe</span></h1>
    </div>
    <nav class="nav">
      <a href="#" class="active"><i class="pi pi-th-large"></i> Dashboard</a>
      <a href="#"><i class="pi pi-calendar"></i> Calendario</a>
      <a href="#"><i class="pi pi-users"></i> Especialistas</a>
      <a href="#"><i class="pi pi-percentage"></i> Promociones</a>
      <a href="#"><i class="pi pi-star"></i> Valoraciones</a>
      <a href="#"><i class="pi pi-clock"></i> Horarios</a>
      <a href="#"><i class="pi pi-chart-bar"></i> Analytics</a>
    </nav>
    <div class="profile">
      <div class="avatar">A</div>
      <div class="info">
        <p>Admin</p>
        <span>admin@auraluxe.com</span>
      </div>
      <button class="logout"><i class="pi pi-sign-out"></i></button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h2>Dashboard</h2>
      <div class="actions">
        <button><i class="pi pi-moon"></i></button>
        <button><i class="pi pi-home"></i></button>
      </div>
    </header>
    <div class="content">
      <div class="placeholder">Vista principal — en móvil aparece la bottom tab bar</div>
    </div>
  </div>
  <nav class="mobile-tabs">
    <a href="#" class="active"><i class="pi pi-th-large"></i>Dashboard</a>
    <a href="#"><i class="pi pi-calendar"></i>Citas</a>
    <a href="#"><i class="pi pi-users"></i>Staff</a>
    <a href="#"><i class="pi pi-star"></i>Reviews</a>
    <a href="#"><i class="pi pi-chart-bar"></i>AI</a>
  </nav>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propuesta 2 — Glass Gradient (adaptada a la paleta actual)</title>
<link href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    background: #faf9f6;
    min-height: 100vh;
    display: flex;
    color: #1a1c1a;
  }
  .sidebar {
    width: 260px;
    background: linear-gradient(180deg, #2c1600 0%, #4a301a 50%, #61401b 100%);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 40;
    padding: 1.5rem 1rem;
  }
  .sidebar::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at top right, rgba(238,189,142,0.1), transparent 60%);
    pointer-events: none;
  }
  .sidebar .logo {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0 0.75rem;
    margin-bottom: 2rem;
    position: relative;
  }
  .sidebar .logo .icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #eebd8e, #79542e);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: #2c1600; font-weight: 800; font-size: 0.85rem;
    font-family: 'Playfair Display', serif;
    box-shadow: 0 4px 12px rgba(121,84,46,0.3);
  }
  .sidebar .logo h1 {
    color: #faf9f6;
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .sidebar .logo h1 span { color: #eebd8e; }
  .nav-label {
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    padding: 1rem 0.75rem 0.5rem;
    position: relative;
  }
  .nav { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; overflow-y: auto; position: relative; }
  .nav a {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 0.7rem 0.75rem;
    border-radius: 12px;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    transition: all 0.2s;
    position: relative;
  }
  .nav a:hover {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.85);
  }
  .nav a.active {
    background: rgba(238,189,142,0.12);
    color: #eebd8e;
    font-weight: 600;
  }
  .nav a.active::before {
    content: '';
    position: absolute; left: -1rem; top: 50%; transform: translateY(-50%);
    width: 4px; height: 24px;
    border-radius: 0 4px 4px 0;
    background: #eebd8e;
  }
  .nav a i { font-size: 1.1rem; min-width: 20px; text-align: center; }
  .nav a .badge {
    margin-left: auto;
    background: rgba(220,38,38,0.15);
    color: #fca5a5;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 100px;
  }
  .profile {
    position: relative;
    margin-top: auto;
    padding-top: 1rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; gap: 0.75rem;
    padding: 1rem 0.75rem 0;
  }
  .profile .avatar {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, #eebd8e, #79542e);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.8rem; color: #2c1600;
    font-family: 'Playfair Display', serif;
    flex-shrink: 0;
  }
  .profile .info { flex: 1; }
  .profile .info p { font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.8); }
  .profile .info span { font-size: 0.65rem; color: rgba(255,255,255,0.3); }
  .profile .logout {
    color: rgba(255,255,255,0.2);
    cursor: pointer; border: none; background: none;
    font-size: 1rem; transition: color 0.15s;
  }
  .profile .logout:hover { color: #fca5a5; }
  .main {
    margin-left: 260px; flex: 1; display: flex; flex-direction: column;
  }
  .topbar {
    height: 64px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #d4c4b7;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
  }
  .topbar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1c1a;
  }
  .topbar .actions { display: flex; gap: 0.75rem; }
  .topbar .actions button {
    width: 36px; height: 36px; border-radius: 10px;
    border: none; background: #f4f3f1; color: #50453b;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .topbar .actions button:hover { background: #e9e8e5; color: #1a1c1a; }
  .content { flex: 1; padding: 2rem; }
  .placeholder {
    background: #fff; border-radius: 16px;
    border: 1px solid #d4c4b7;
    padding: 2rem; text-align: center; color: #82756a; font-size: 0.9rem;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="logo">
      <div class="icon">AL</div>
      <h1>Aura <span>Luxe</span></h1>
    </div>
    <div class="nav-label">General</div>
    <nav class="nav">
      <a href="#" class="active"><i class="pi pi-th-large"></i> Dashboard</a>
      <a href="#"><i class="pi pi-calendar"></i> Calendario <span class="badge">3</span></a>
      <a href="#"><i class="pi pi-users"></i> Especialistas</a>
    </nav>
    <div class="nav-label">Gestión</div>
    <nav class="nav">
      <a href="#"><i class="pi pi-percentage"></i> Promociones</a>
      <a href="#"><i class="pi pi-star"></i> Valoraciones <span class="badge">12</span></a>
      <a href="#"><i class="pi pi-clock"></i> Horarios</a>
    </nav>
    <div class="nav-label">Inteligencia</div>
    <nav class="nav">
      <a href="#"><i class="pi pi-chart-bar"></i> Analytics</a>
    </nav>
    <div class="profile">
      <div class="avatar">A</div>
      <div class="info">
        <p>Administrador</p>
        <span>admin@auraluxe.com</span>
      </div>
      <button class="logout"><i class="pi pi-sign-out"></i></button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h2>Dashboard</h2>
      <div class="actions">
        <button><i class="pi pi-moon"></i></button>
        <button><i class="pi pi-home"></i></button>
      </div>
    </header>
    <div class="content">
      <div class="placeholder">Contenido principal</div>
    </div>
  </div>
</body>
</html>
